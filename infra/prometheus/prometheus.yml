global:
  scrape_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: routemq-app
    metrics_path: /metrics
    static_configs:
      - targets:
          - app:8080

  - job_name: mosquitto-exporter
    metrics_path: /metrics
    static_configs:
      - targets:
          - mosquitto-exporter:9234
