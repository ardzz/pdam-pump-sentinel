name: pdam-pump-sentinel-dev

services:
  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "${MQTT_PORT:-1883}:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log
    healthcheck:
      test: ["CMD", "mosquitto_pub", "-h", "127.0.0.1", "-p", "1883", "-t", "pdam-pump-sentinel/health", "-m", "ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    ports:
      - "${CLICKHOUSE_HTTP_PORT:-8123}:8123"
      - "${CLICKHOUSE_NATIVE_PORT:-9000}:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.17.2
    command:
      - mlflow
      - server
      - --host
      - 0.0.0.0
      - --port
      - "5000"
      - --backend-store-uri
      - sqlite:////mlflow/mlflow.db
      - --default-artifact-root
      - /mlflow/artifacts
    ports:
      - "${MLFLOW_PORT:-5000}:5000"
    environment:
      TZ: ${TZ:-Asia/Jakarta}
      MLFLOW_TRACKING_URI: http://0.0.0.0:5000
    volumes:
      - mlflow-data:/mlflow
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/health', timeout=3).read()\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  app:
    image: ghcr.io/astral-sh/uv:python3.13-bookworm-slim
    working_dir: /workspace
    command: ["sh", "-c", "uv sync --frozen && uv run python -m bootstrap.app"]
    environment:
      UV_PROJECT_ENVIRONMENT: /opt/pdam-venv
      MQTT_BROKER: mosquitto
      MQTT_PORT: "1883"
      ENABLE_REDIS: ${ENABLE_REDIS:-true}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      ENABLE_TELEMETRY: ${ENABLE_TELEMETRY:-true}
      TELEMETRY_CONNECTION: ${TELEMETRY_CONNECTION:-clickhouse}
      TELEMETRY_URL: ${TELEMETRY_URL:-http://default:@clickhouse:8123/default}
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI:-http://mlflow:5000}
      HEALTH_HTTP_ENABLED: ${HEALTH_HTTP_ENABLED:-true}
      HEALTH_HTTP_HOST: 0.0.0.0
      HEALTH_HTTP_PORT: "8080"
      METRICS_HTTP_ENABLED: ${METRICS_HTTP_ENABLED:-true}
      METRICS_HTTP_PATH: ${METRICS_HTTP_PATH:-/metrics}
      METRICS_HTTP_SEPARATE: ${METRICS_HTTP_SEPARATE:-false}
      METRICS_HTTP_HOST: 0.0.0.0
      METRICS_HTTP_PORT: "8080"
      METRICS_NAMESPACE: ${METRICS_NAMESPACE:-routemq}
      METRICS_DEFAULT_LABELS: ${METRICS_DEFAULT_LABELS:-service=pdam-pump-sentinel,env=dev}
    ports:
      - "${APP_METRICS_PORT:-8080}:8080"
    volumes:
      - ..:/workspace
      - app-venv:/opt/pdam-venv
      - uv-cache:/root/.cache/uv
    depends_on:
      mosquitto:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      mlflow:
        condition: service_started

  prometheus:
    image: prom/prometheus:v2.55.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:11.3.0
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

volumes:
  mosquitto-data:
  mosquitto-log:
  redis-data:
  clickhouse-data:
  mlflow-data:
  app-venv:
  uv-cache:
  grafana-data:

networks:
  default:
    name: pdam-pump-sentinel-dev
